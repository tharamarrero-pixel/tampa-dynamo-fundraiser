<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Tampa Dynamo Fundraiser</title>
<link rel="stylesheet" href="css/styles.css">
<meta name="theme-color" content="#741824">
</head>
<body>
<div class="shell">
<header class="site-header">
<img class="logo" src="assets/tampa-dynamo-logo.png" alt="Tampa Dynamo logo">
<div><h1>31 DAY<br>CHALLENGE</h1><p>Choose a player and reserve a day. The day number is the donation amount.</p></div>
</header>
<main>
<nav class="nav"><a class="link-btn btn-light" href="admin.html">Admin</a></nav>
<div id="errorBox" class="error"></div>
<section class="stats">
<div class="stat"><small>Players</small><strong id="playerCount">11</strong></div>
<div class="stat"><small>Team committed</small><strong id="teamTotal">$0</strong></div>
<div class="stat"><small>Team goal</small><strong id="teamGoal">$5,456</strong></div>
</section>
<div class="progress-track"><div id="teamProgress" class="progress-fill"></div></div>
<div class="toolbar"><h2>Select a player</h2><input id="searchInput" class="search" type="search" placeholder="Search player"></div>
<section id="playerGrid" class="player-grid"></section>
</main>
<div class="footer-note">Reservations update in real time. Each player has an independent $496 calendar.</div>
</div>
<script type="module" src="js/home.js"></script>
</body>
</html>

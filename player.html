<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Player Fundraiser | Tampa Dynamo</title>
<link rel="stylesheet" href="css/styles.css">
<meta name="theme-color" content="#741824">
</head>
<body>
<div class="shell">
<header class="site-header">
<img class="logo" src="assets/tampa-dynamo-logo.png" alt="Tampa Dynamo logo">
<div><h1>31 DAY<br>CHALLENGE</h1><p id="headerText">Support a Tampa Dynamo player.</p></div>
</header>
<main>
<nav class="nav"><a class="link-btn btn-light" href="index.html">← All players</a></nav>
<div id="errorBox" class="error"></div>
<div class="player-title"><div><h2 id="playerName">Player</h2><p id="playerJersey"></p></div></div>
<section class="stats">
<div class="stat"><small>Days reserved</small><strong id="reservedCount">0 / 31</strong></div>
<div class="stat"><small>Committed</small><strong id="playerTotal">$0</strong></div>
<div class="stat"><small>Goal</small><strong>$496</strong></div>
</section>
<div class="progress-track"><div id="playerProgress" class="progress-fill"></div></div>
<section id="calendar" class="calendar"></section>
<button id="shareBtn" class="btn btn-dark" style="display:flex;margin:24px auto 0">Share this calendar</button>
<p class="notice">A reserved day is locked only for this player.</p>
</main>
</div>

<div id="modalBackdrop" class="modal-backdrop" role="dialog" aria-modal="true">
<div class="modal">
<div id="modalSuccess" class="success"></div>
<h2 id="modalTitle">Reserve a day</h2>
<p id="modalDescription"></p>
<label for="donorName">Name *</label><input id="donorName" maxlength="60" autocomplete="name">
<label for="phone">Phone (optional)</label><input id="phone" maxlength="25" autocomplete="tel">
<label for="email">Email (optional)</label><input id="email" maxlength="100" autocomplete="email">
<label for="payment">Payment method (optional)</label>
<select id="payment"><option value="">Select</option><option>Cash</option><option>Zelle</option><option>Venmo</option><option>Cash App</option><option>Other</option></select>
<label for="message">Support message (optional)</label><textarea id="message" maxlength="180" placeholder="Go Tampa Dynamo!"></textarea>
<div class="modal-actions"><button id="cancelBtn" class="btn btn-light">Cancel</button><button id="confirmBtn" class="btn btn-primary">Confirm reservation</button></div>
</div>
</div>
<script type="module" src="js/player.js"></script>
</body>
</html>
